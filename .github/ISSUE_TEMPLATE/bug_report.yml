name: Bug Report
description: Report a bug in OneGlanse
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Fill in as much detail as you can.

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Web app
        - Agent / browser automation
        - Provider auth
        - Response analysis
        - Self-host / Docker
        - Docs
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Set `DEBUG_ENABLED=true` in `.env` for verbose agent output.
      render: shell

  - type: input
    id: version
    attributes:
      label: OneGlanse version or commit
      placeholder: e.g. d8e85486

  - type: input
    id: os
    attributes:
      label: OS + Node.js version
      placeholder: e.g. macOS 15, Node 22
